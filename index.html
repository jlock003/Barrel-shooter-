<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Barrel Blasters</title>
<style>
  :root{--blue:#1592bd;--orange:#e36b10;--dark:#15232b;--panel:#fff;--muted:#61727c}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(#eaf5f9,#dbe8ee);color:var(--dark);min-height:100vh;display:flex;justify-content:center}
  .app{width:min(100%,480px);min-height:100vh;background:linear-gradient(#edf8fb,#e3eef2);box-shadow:0 0 30px #0002;padding-bottom:88px}
  header{background:#fff;padding:18px 18px 12px;text-align:center;border-bottom:1px solid #cfdce2}
  .logo{font-weight:1000;line-height:.85;letter-spacing:.5px;font-size:38px}.logo .b1{color:var(--blue)}.logo .b2{color:var(--orange)}
  .tag{font-size:12px;color:var(--muted);margin-top:8px;letter-spacing:1.4px}
  main{padding:16px}.card{background:var(--panel);border-radius:18px;box-shadow:0 4px 16px #27404d1c;padding:16px}
  h1{font-size:28px;margin:0 0 14px;text-align:center;letter-spacing:.4px}
  .hud{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}.hud div{background:#f3f7f9;border-radius:12px;padding:8px 6px;text-align:center;font-size:12px;color:var(--muted)}.hud strong{display:block;font-size:21px;color:var(--dark)}
  .range{position:relative;overflow:hidden;height:410px;border-radius:18px;border:2px solid #dbe4e8;background:linear-gradient(#a9d7ef 0 42%,#8abf73 42% 58%,#755b3c 58% 100%);touch-action:none;user-select:none}
  .cloud{position:absolute;background:#fff8;border-radius:50px}.hill{position:absolute;bottom:150px;border-radius:50% 50% 0 0;background:#5f915a}.ground-lines{position:absolute;inset:58% 0 0;background:repeating-linear-gradient(165deg,#ffffff12 0 3px,#0000000a 3px 7px)}
  .barrel{position:absolute;left:50%;bottom:48px;width:126px;height:205px;transform:translateX(-50%);border-radius:24% 24% 18% 18%/12% 12% 10% 10%;background:linear-gradient(90deg,#4e2f17 0 5%,#8a5a2e 7% 15%,#b98249 18% 29%,#8f5e31 31% 42%,#c28b51 44% 56%,#8a572b 58% 69%,#b98249 71% 84%,#5b361a 87% 100%);box-shadow:0 16px 18px #0005,inset 0 0 20px #0005;transition:transform .12s,filter .12s}
  .barrel::before,.barrel::after,.band{content:"";position:absolute;left:-6px;right:-6px;height:16px;background:linear-gradient(#4b4f51,#202527);border-radius:8px;box-shadow:0 2px 2px #0008}.barrel::before{top:28px}.barrel::after{bottom:30px}.band{top:94px}
  .plug{position:absolute;left:50%;top:97px;transform:translate(-50%,-50%);width:26px;height:26px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#ba8752,#4e2d14 70%);border:2px solid #3c2514}
  .crosshair{position:absolute;width:72px;height:72px;border:4px solid #ef431d;border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;box-shadow:0 0 0 2px #fff8,0 0 14px #0007}.crosshair::before,.crosshair::after{content:"";position:absolute;background:#ef431d}.crosshair::before{width:4px;height:100px;left:30px;top:-18px}.crosshair::after{height:4px;width:100px;top:30px;left:-18px}
  .shot{position:absolute;width:18px;height:18px;border-radius:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,#111 0 25%,#e9d9a8 30% 52%,#3d2b18 57% 100%);pointer-events:none}
  .message{position:absolute;top:18px;left:50%;transform:translateX(-50%);background:#fffE;padding:8px 14px;border-radius:20px;font-weight:900;box-shadow:0 3px 12px #0003;opacity:0;transition:opacity .15s;white-space:nowrap}.message.show{opacity:1}
  .controls{margin-top:14px;display:grid;gap:10px}button{border:0;border-radius:14px;padding:16px;font-size:18px;font-weight:900;cursor:pointer;touch-action:manipulation}#startBtn{background:linear-gradient(#df6c11,#b94d00);color:#fff;box-shadow:0 5px 0 #8d3d05}#startBtn:active{transform:translateY(3px);box-shadow:0 2px 0 #8d3d05}
  .tiprow{display:flex;justify-content:space-between;gap:8px;margin-top:12px;color:var(--muted);font-size:13px}.meter{margin-top:10px}.meter label{display:flex;justify-content:space-between;font-size:13px;color:var(--muted)}.track{height:10px;background:#dce7eb;border-radius:99px;overflow:hidden}.fill{height:100%;background:var(--blue);width:0%;transition:width .25s}
  nav{position:fixed;bottom:0;width:min(100%,480px);height:76px;background:#fff;border-top:1px solid #cdd9df;display:grid;grid-template-columns:repeat(4,1fr);box-shadow:0 -4px 16px #0001}nav div{display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;color:#71808a}nav .active{color:var(--orange);font-weight:800}nav span{font-size:26px;line-height:1.1}
  .overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#0c1b2299;color:#fff;text-align:center;padding:25px;font-size:21px;font-weight:800;z-index:4;pointer-events:none}.overlay small{display:block;font-size:14px;font-weight:500;margin-top:8px}
  @media (max-height:760px){.range{height:330px}.barrel{height:165px;width:105px}.band{top:74px}.plug{top:78px}}
</style>
</head>
<body>
<div class="app">
<header><div class="logo"><div class="b1">BARREL 🎯</div><div class="b2">BLASTERS</div></div><div class="tag">AIM • STEADY • TAP</div></header>
<main><section class="card"><h1>BLAST THE BARRELS</h1>
<div class="hud"><div>SCORE<strong id="score">0</strong></div><div>TIME<strong id="time">30</strong></div><div>WIND<strong id="wind">0</strong></div></div>
<div class="range" id="range">
<div class="cloud" style="width:110px;height:28px;top:38px;left:24px"></div><div class="cloud" style="width:78px;height:22px;top:78px;right:34px"></div><div class="hill" style="width:260px;height:100px;left:-80px"></div><div class="hill" style="width:300px;height:120px;right:-100px"></div><div class="ground-lines"></div>
<div class="message" id="message">Bullseye!</div><div class="barrel" id="barrel"><div class="band"></div><div class="plug"></div></div><div class="crosshair" id="crosshair"></div><div class="overlay" id="overlay">Tap “Start Practice Session”<small>Then tap anywhere in the range to aim and fire.</small></div>
</div>
<div class="controls"><button id="startBtn" type="button">🎯 START PRACTICE SESSION</button></div>
<div class="meter"><label><span>Goal Progress</span><span id="goalText">0 / 50</span></label><div class="track"><div class="fill" id="goalFill"></div></div></div>
<div class="tiprow"><span>⌛ Patience</span><span>🏆 Stability</span><span>💨 Windage</span></div>
</section></main>
<nav><div class="active"><span>🛢️</span>Home</div><div><span>🎯</span>Challenges</div><div><span>📊</span>Stats</div><div><span>⚙️</span>Profile</div></nav>
</div>
<script>
(function(){
  var range=document.getElementById('range'),crosshair=document.getElementById('crosshair'),barrel=document.getElementById('barrel'),overlay=document.getElementById('overlay'),startBtn=document.getElementById('startBtn'),scoreEl=document.getElementById('score'),timeEl=document.getElementById('time'),windEl=document.getElementById('wind'),message=document.getElementById('message'),goalText=document.getElementById('goalText'),goalFill=document.getElementById('goalFill');
  var running=false,score=0,hits=0,seconds=30,timer=null,aimX=50,aimY=45,wind=0,swayPhase=0;
  function setCrosshair(x,y){aimX=Math.max(4,Math.min(96,x));aimY=Math.max(5,Math.min(95,y));crosshair.style.left=aimX+'%';crosshair.style.top=aimY+'%'}
  setCrosshair(50,45);
  function pointerPos(e){var r=range.getBoundingClientRect(),p=e.changedTouches?e.changedTouches[0]:(e.touches?e.touches[0]:e);return{x:(p.clientX-r.left)/r.width*100,y:(p.clientY-r.top)/r.height*100}}
  function shootAtEvent(e){if(!running)return;e.preventDefault();var p=pointerPos(e);setCrosshair(p.x,p.y);fire()}
  range.addEventListener('click',shootAtEvent,false);
  range.addEventListener('touchend',shootAtEvent,{passive:false});
  function fire(){if(!running)return;var r=range.getBoundingClientRect(),sway=Math.sin(swayPhase)*1.8,finalX=aimX+wind*.7+sway,finalY=aimY+Math.cos(swayPhase*1.4)*1.2;var shot=document.createElement('div');shot.className='shot';shot.style.left=finalX+'%';shot.style.top=finalY+'%';range.appendChild(shot);setTimeout(function(){if(shot.parentNode)shot.parentNode.removeChild(shot)},900);
    var br=barrel.getBoundingClientRect(),px=r.left+finalX/100*r.width,py=r.top+finalY/100*r.height,cx=br.left+br.width/2,cy=br.top+br.height/2,dx=(px-cx)/(br.width/2),dy=(py-cy)/(br.height/2),dist=Math.sqrt(dx*dx+dy*dy),points=0,text='Miss!';
    if(dist<.18){points=100;text='BULLSEYE! +100'}else if(dist<.42){points=50;text='Great shot! +50'}else if(dist<.72){points=25;text='Hit! +25'}
    if(points){hits++;barrel.style.transform='translateX(-50%) scale(.96) rotate(1deg)';barrel.style.filter='brightness(1.35)';setTimeout(function(){barrel.style.transform='translateX(-50%)';barrel.style.filter='none'},120)}
    score+=points;scoreEl.textContent=score;goalText.textContent=Math.min(hits,50)+' / 50';goalFill.style.width=Math.min(hits/50*100,100)+'%';message.textContent=text;message.classList.add('show');clearTimeout(message._t);message._t=setTimeout(function(){message.classList.remove('show')},520);wind=Math.max(-8,Math.min(8,wind+(Math.random()*4-2)));windEl.textContent=(wind>0?'+':'')+wind.toFixed(1);moveBarrel()}
  function moveBarrel(){var x=20+Math.random()*60,scale=.78+Math.random()*.34;barrel.style.left=x+'%';barrel.style.bottom=(34+Math.random()*40)+'px';barrel.style.width=(126*scale)+'px';barrel.style.height=(205*scale)+'px'}
  function start(){clearInterval(timer);running=true;score=0;hits=0;seconds=30;wind=Math.random()*6-3;overlay.style.display='none';scoreEl.textContent='0';timeEl.textContent=seconds;windEl.textContent=(wind>0?'+':'')+wind.toFixed(1);goalText.textContent='0 / 50';goalFill.style.width='0%';startBtn.textContent='RESTART SESSION';moveBarrel();timer=setInterval(function(){swayPhase+=.45;seconds--;timeEl.textContent=seconds;if(seconds<=0)end()},1000)}
  function end(){running=false;clearInterval(timer);overlay.style.display='flex';overlay.innerHTML='Session complete!<small>Score: '+score+' • Barrel hits: '+hits+'<br>Tap restart to play again.</small>';startBtn.textContent='🎯 RESTART PRACTICE SESSION'}
  startBtn.addEventListener('click',function(e){e.preventDefault();start()},false);
  startBtn.addEventListener('touchend',function(e){e.preventDefault();start()},{passive:false});
})();
</script>
</body>
</html>
